[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Do not set startCommand here: Railway passes it in exec form and $PORT is not expanded.
# The Dockerfile CMD uses `sh -c` so ${PORT} is expanded at container runtime.
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
